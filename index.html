<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Registre Fournisseurs — évaluez vos fournisseurs, notez leurs produits et gardez vos commentaires illustrés de photos.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<title>Registre Fournisseurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2A4A;
    --ink-soft:#33456B;
    --paper:#F2EFE6;
    --paper-raised:#FBFAF5;
    --gold:#B8912A;
    --sage:#5F7455;
    --brick:#A63D2F;
    --line:#D9D3C1;
    --text-dim:#7A7566;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  header.top{
    background:var(--ink);
    color:var(--paper-raised);
    padding:22px 24px 20px;
    position:sticky; top:0; z-index:20;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:16px; max-width:1100px; margin:0 auto;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .stamp-mark{
    width:38px; height:38px; border-radius:50%;
    border:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; font-size:15px; color:var(--gold);
    transform:rotate(-6deg);
    flex-shrink:0;
  }
  .brand h1{font-size:20px; margin:0; letter-spacing:.02em; font-weight:600;}
  .brand p{margin:2px 0 0; font-size:12px; color:#B9C2D6; letter-spacing:.04em;}
  .top-actions{display:flex; gap:8px;}
  .view-tabs{display:flex; gap:6px; max-width:1100px; margin:14px auto 0; border-bottom:1px solid #35447A;}
  .view-tab{
    background:transparent; border:none; color:#AEB9D4; font-family:'IBM Plex Sans',sans-serif;
    font-size:13.5px; font-weight:500; padding:9px 4px; cursor:pointer; position:relative; margin-right:18px;
  }
  .view-tab:hover{color:#fff;}
  .view-tab.active{color:#fff;}
  .view-tab.active::after{
    content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--gold);
  }
  .btn{
    border:1px solid transparent; border-radius:3px; cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:500;
    padding:8px 14px; transition:transform .12s ease, background .15s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-ghost{background:transparent; border-color:#4A5C82; color:#DCE2F0;}
  .btn-ghost:hover{background:#26365A;}
  .btn-gold{background:var(--gold); color:#221904;}
  .btn-gold:hover{background:#C9A230;}
  .btn-sage{background:var(--sage); color:#F5F7F1;}
  .btn-sage:hover{background:#6D8560;}
  .btn-line{background:transparent; border-color:var(--line); color:var(--ink);}
  .btn-line:hover{background:#E9E4D3;}
  .btn-danger{background:transparent; color:var(--brick); border-color:transparent; padding:4px 8px; font-size:12px;}
  .btn-danger:hover{text-decoration:underline;}
  input[type=file].btn-line{display:none;}

  .layout{display:flex; max-width:1100px; margin:0 auto; min-height:calc(100vh - 90px);}
  .sidebar{
    width:280px; flex-shrink:0; padding:22px 18px; border-right:1px solid var(--line);
  }
  .sidebar-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .sidebar-head span{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim);}
  .search{
    width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:3px;
    background:var(--paper-raised); font-family:'IBM Plex Sans'; font-size:13px; margin-bottom:14px;
  }
  .supplier-item{
    padding:10px 12px; border-radius:4px; cursor:pointer; margin-bottom:4px;
    border:1px solid transparent; transition:background .12s ease;
  }
  .supplier-item:hover{background:#E9E4D3;}
  .supplier-item.active{background:var(--paper-raised); border-color:var(--line); box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .supplier-item .name{font-weight:600; font-size:14px;}
  .supplier-item .cat{font-size:11px; color:var(--text-dim); margin-top:2px;}
  .supplier-item .badge-row{display:flex; align-items:center; gap:6px; margin-top:6px;}
  .mini-stamp{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:500;
    padding:1px 6px; border-radius:9px; border:1px solid currentColor;
  }
  .empty-side{font-size:12.5px; color:var(--text-dim); padding:8px 4px; line-height:1.5;}

  .sheet-item{
    padding:10px 12px; border-radius:4px; cursor:pointer; margin-bottom:4px;
    border:1px solid transparent; transition:background .12s ease;
  }
  .sheet-item:hover{background:#E9E4D3;}
  .sheet-item.active{background:var(--paper-raised); border-color:var(--line); box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .sheet-item .name{font-weight:600; font-size:14px;}
  .sheet-item .meta{font-size:11px; color:var(--text-dim); margin-top:2px;}

  .main{flex:1; padding:26px 30px 60px; min-width:0;}
  .empty-main{
    text-align:center; padding:90px 20px; color:var(--text-dim);
  }
  .empty-main h2{font-family:'Fraunces',serif; font-size:22px; color:var(--ink); margin-bottom:6px;}

  .supplier-header{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:6px;}
  .supplier-title-block input.name-input{
    font-family:'Fraunces',serif; font-size:28px; font-weight:600; border:none; background:transparent;
    color:var(--ink); padding:2px 0; width:100%;
  }
  .supplier-title-block input.name-input:focus{outline:none; border-bottom:1px solid var(--gold);}
  .cat-input{
    border:none; background:transparent; font-size:12.5px; color:var(--text-dim); letter-spacing:.04em;
    text-transform:uppercase; margin-top:2px; width:100%;
  }
  .cat-input:focus{outline:none; border-bottom:1px solid var(--line);}

  .contact-row{display:flex; gap:22px; flex-wrap:wrap; margin-top:10px;}
  .contact-field{display:flex; align-items:center; gap:8px;}
  .contact-input{
    border:none; background:transparent; font-size:12.5px; color:var(--ink-soft);
    padding:2px 0; border-bottom:1px dashed var(--line); min-width:150px;
  }
  .contact-input:focus{outline:none; border-bottom-color:var(--gold);}
  .contact-link{
    font-size:10.5px; color:var(--sage); text-decoration:none; border:1px solid var(--sage);
    padding:2px 8px; border-radius:10px; white-space:nowrap;
  }
  .contact-link:hover{background:var(--sage); color:#fff;}

  .status-select{
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; letter-spacing:.03em;
    padding:6px 10px; border-radius:12px; border:1px solid transparent; cursor:pointer;
    -webkit-appearance:none; appearance:none; text-align:center;
  }
  .status-select.status-actif{background:#E7EEE3; color:var(--sage); border-color:var(--sage);}
  .status-select.status-test{background:#F5EBD9; color:var(--gold); border-color:var(--gold);}
  .status-select.status-eviter{background:#F5E1DC; color:var(--brick); border-color:var(--brick);}

  .status-pill{
    font-size:10px; font-weight:500; padding:2px 8px; border-radius:9px; letter-spacing:.02em;
  }
  .status-pill.status-actif{background:#E7EEE3; color:var(--sage);}
  .status-pill.status-test{background:#F5EBD9; color:var(--gold);}
  .status-pill.status-eviter{background:#F5E1DC; color:var(--brick);}

  .search-hint{font-size:10.5px; color:var(--text-dim); margin-top:4px; font-style:italic;}

  .supplier-overall{display:flex; align-items:center; gap:10px; flex-shrink:0;}

  .stamp{
    width:64px; height:64px; border-radius:50%;
    border:3px double currentColor;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transform:rotate(-5deg); flex-shrink:0;
  }
  .stamp .num{font-family:'Fraunces',serif; font-size:20px; font-weight:700; line-height:1;}
  .stamp .lbl{font-family:'IBM Plex Mono',monospace; font-size:8px; letter-spacing:.06em; margin-top:1px;}
  .rating-good{color:var(--sage);}
  .rating-mid{color:var(--gold);}
  .rating-low{color:var(--brick);}
  .rating-none{color:var(--text-dim);}

  hr.rule{border:none; border-top:1px solid var(--line); margin:18px 0 22px;}

  .section-label{
    font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim);
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
  }

  .product-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:5px;
    margin-bottom:14px; overflow:hidden;
  }
  .product-head{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:14px 16px; cursor:pointer;
  }
  .product-head:hover{background:#F5F3EB;}
  .product-head-left{display:flex; align-items:center; gap:12px; min-width:0;}
  .product-name{font-weight:600; font-size:15px;}
  .product-meta{font-size:11.5px; color:var(--text-dim); margin-top:2px;}
  .stars{display:inline-flex; gap:1px; font-size:13px; letter-spacing:1px;}
  .chevron{transition:transform .15s ease; color:var(--text-dim); flex-shrink:0;}
  .chevron.open{transform:rotate(90deg);}

  .product-body{padding:0 16px 16px; border-top:1px solid var(--line);}
  .comment{
    display:flex; gap:12px; padding:14px 0; border-bottom:1px dashed var(--line);
  }
  .comment:last-child{border-bottom:none;}
  .comment-photos{display:flex; flex-wrap:wrap; gap:6px; width:74px; flex-shrink:0;}
  .comment-photo{
    width:34px; height:34px; border-radius:3px; object-fit:cover; flex-shrink:0;
    border:1px solid var(--line); cursor:pointer;
  }
  .comment-photo-placeholder{
    width:74px; height:34px; border-radius:3px; flex-shrink:0; background:#EDE9DB;
  }
  .comment-body{flex:1; min-width:0;}
  .comment-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .comment-date{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-dim);}
  .comment-text{font-size:13.5px; line-height:1.5; margin-top:4px; white-space:pre-wrap;}

  .add-row{margin-top:10px;}
  .piece-library{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:10px;}
  .piece-lib-label{font-size:11px; color:var(--text-dim); margin-right:2px;}
  .piece-chip{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:14px; padding:4px 12px;
    font-size:12px; cursor:pointer; color:var(--ink-soft); font-family:'IBM Plex Sans',sans-serif;
    transition:background .12s ease, color .12s ease, border-color .12s ease;
  }
  .piece-chip:hover{background:var(--gold); border-color:var(--gold); color:#221904;}

  .ref-badge{
    font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:500; color:var(--gold);
    background:#F5EBD9; padding:2px 8px; border-radius:9px; margin-left:8px; vertical-align:middle;
  }

  .modal-overlay{
    position:fixed; inset:0; background:rgba(27,42,74,.55); display:flex; align-items:center; justify-content:center;
    z-index:150; padding:20px;
  }
  .modal-box{
    background:var(--paper-raised); border-radius:6px; max-width:480px; width:100%;
    max-height:88vh; overflow-y:auto; padding:26px 26px 22px; box-shadow:0 12px 40px rgba(0,0,0,.25);
  }
  .modal-box h3{font-family:'Fraunces',serif; font-size:20px; margin:0 0 6px;}
  .modal-box .modal-sub{font-size:12.5px; color:var(--text-dim); line-height:1.5; margin-bottom:18px;}
  .modal-actions{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}
  .modal-close-x{
    position:absolute; top:14px; right:16px; background:none; border:none; font-size:20px; cursor:pointer; color:var(--text-dim);
  }
  #logoPreviewWrap{display:flex; align-items:center; gap:10px; margin-bottom:4px;}
  #logoPreviewWrap img{max-width:120px; max-height:60px; border:1px solid var(--line); border-radius:4px; background:#fff; padding:4px;}
  .new-product-form, .new-comment-form, .sheet-form{
    background:#EFEADA; border:1px solid var(--line); border-radius:4px; padding:14px; margin-top:10px;
  }
  .field{margin-bottom:10px;}
  .field label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); margin-bottom:4px;}
  .field input[type=text], .field textarea{
    width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:3px;
    font-family:'IBM Plex Sans'; font-size:13.5px; background:var(--paper-raised); resize:vertical;
  }
  .field textarea{min-height:64px;}
  .score-badge{
    font-family:'Fraunces',serif; font-weight:600; font-size:14px;
    padding:2px 8px; border-radius:9px; border:1px solid currentColor;
  }
  .score-picker{display:flex; flex-wrap:wrap; gap:6px; cursor:pointer;}
  .score-picker span{
    width:30px; height:30px; border-radius:4px; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text-dim);
    background:var(--paper-raised); transition:background .12s ease, color .12s ease, border-color .12s ease;
  }
  .score-picker span:hover{border-color:var(--gold);}
  .score-picker span.filled{background:var(--gold); border-color:var(--gold); color:#221904; font-weight:600;}
  .form-actions{display:flex; gap:8px; margin-top:12px; align-items:center;}
  .photo-preview{display:flex; flex-wrap:wrap; gap:10px; margin-top:8px;}
  .photo-thumb{position:relative; width:56px; height:56px;}
  .photo-thumb img{width:56px; height:56px; object-fit:cover; border-radius:3px; border:1px solid var(--line); display:block;}
  .photo-thumb-remove{
    position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%;
    background:var(--brick); color:#fff; border:none; cursor:pointer; font-size:12px; line-height:1;
    display:flex; align-items:center; justify-content:center; padding:0;
  }

  .lightbox{
    position:fixed; inset:0; background:rgba(27,42,74,.92); display:flex; align-items:center; justify-content:center;
    z-index:100; padding:30px;
  }
  .lightbox img{max-width:90vw; max-height:85vh; border-radius:4px;}
  .lightbox .close{position:absolute; top:20px; right:26px; color:#fff; font-size:28px; cursor:pointer; background:none; border:none;}
  .lb-nav{
    position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.12); border:none;
    color:#fff; width:44px; height:44px; border-radius:50%; font-size:26px; cursor:pointer; line-height:1;
  }
  .lb-nav:hover{background:rgba(255,255,255,.22);}
  .lb-prev{left:20px;}
  .lb-next{right:20px;}
  .lb-count{position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#fff; font-size:12px; opacity:.8;}

  .sheet-header-form{display:grid; grid-template-columns:1fr 1fr; gap:12px 16px; margin-bottom:18px;}
  .sheet-header-form .field.full{grid-column:1 / -1;}

  .debit-table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:5px; background:var(--paper-raised);}
  table.debit-table{width:100%; border-collapse:collapse; font-size:13px; min-width:720px;}
  table.debit-table th{
    text-align:left; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim);
    padding:9px 8px; border-bottom:1px solid var(--line); background:#EFEADA; white-space:nowrap;
  }
  table.debit-table td{padding:5px 8px; border-bottom:1px solid var(--line); vertical-align:middle;}
  table.debit-table tr:last-child td{border-bottom:none;}
  table.debit-table input{
    width:100%; border:1px solid transparent; background:transparent; padding:5px 6px; border-radius:3px;
    font-family:'IBM Plex Sans'; font-size:13px; color:var(--ink);
  }
  table.debit-table input:hover{border-color:var(--line);}
  table.debit-table input:focus{outline:none; border-color:var(--gold); background:var(--paper);}
  table.debit-table input.num{text-align:right; font-family:'IBM Plex Mono',monospace;}
  td.col-actions{width:36px; text-align:center;}
  th.col-actions{width:36px;}

  .totals-bar{
    display:flex; flex-wrap:wrap; gap:22px; margin-top:14px; padding:12px 16px;
    background:var(--paper-raised); border:1px solid var(--line); border-radius:5px;
  }
  .totals-bar .tot{display:flex; flex-direction:column;}
  .totals-bar .tot .lbl{font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim);}
  .totals-bar .tot .val{font-family:'Fraunces',serif; font-weight:600; font-size:18px; color:var(--ink);}

  .sheet-toolbar{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:14px;}
  .sheet-toolbar-actions{display:flex; gap:8px;}

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:4px; font-size:13px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:200;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

  @media (max-width:760px){
    .layout{flex-direction:column;}
    .sidebar{width:100%; border-right:none; border-bottom:1px solid var(--line);}
    .main{padding:20px 16px 60px;}
    .sheet-header-form{grid-template-columns:1fr;}
    .view-tabs{padding:0 16px;}
  }

  button:focus-visible, input:focus-visible, textarea:focus-visible, .supplier-item:focus-visible{
    outline:2px solid var(--gold); outline-offset:2px;
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="brand">
      <div class="stamp-mark">RF</div>
      <div>
        <h1>Registre Fournisseurs</h1>
        <p>Évaluations &amp; observations produit</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn btn-ghost" id="btnCompanySettings">🏢 Entreprise</button>
      <button class="btn btn-ghost" id="btnExport">Exporter</button>
      <label class="btn btn-ghost" style="cursor:pointer;">
        Importer
        <input type="file" id="btnImport" accept="application/json" style="display:none;">
      </label>
    </div>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" data-view="suppliers">Fournisseurs</button>
    <button class="view-tab" data-view="debit">Fiches de débit</button>
  </div>
</header>

<div class="layout" id="layoutSuppliers">
  <aside class="sidebar">
    <div class="sidebar-head">
      <span>Fournisseurs</span>
      <button class="btn btn-gold" id="btnAddSupplier" style="padding:5px 10px; font-size:12px;">+ Ajouter</button>
    </div>
    <input class="search" id="searchInput" placeholder="Fournisseur, produit ou commentaire…">
    <div id="supplierList"></div>
  </aside>

  <main class="main" id="mainArea"></main>
</div>

<div class="layout" id="layoutDebit" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-head">
      <span>Fiches de débit</span>
      <button class="btn btn-gold" id="btnAddSheet" style="padding:5px 10px; font-size:12px;">+ Nouvelle</button>
    </div>
    <input class="search" id="sheetSearchInput" placeholder="Rechercher une fiche…">
    <div id="sheetList"></div>
  </aside>

  <main class="main" id="debitMainArea"></main>
</div>

<div id="toast" class="toast"></div>

<div id="companyModal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="position:relative;">
    <button class="modal-close-x" id="btnCompanyModalClose">&times;</button>
    <h3>Coordonnées de l'entreprise</h3>
    <div class="modal-sub">Ces informations apparaissent en en-tête des fiches de débit téléchargées en PDF.</div>
    <div class="field">
      <label>Logo</label>
      <div id="logoPreviewWrap"></div>
      <label class="btn btn-line" style="display:inline-block; cursor:pointer; padding:6px 12px; font-size:12.5px; margin-top:4px;">
        Choisir un logo
        <input type="file" id="companyLogoInput" accept="image/*" style="display:none;">
      </label>
    </div>
    <div class="field">
      <label>Nom de l'entreprise</label>
      <input type="text" id="companyName" placeholder="ex. Menuiserie Dupont">
    </div>
    <div class="field">
      <label>Adresse</label>
      <input type="text" id="companyAddress" placeholder="ex. 4 rue de l'Atelier, 44000 Nantes">
    </div>
    <div class="field">
      <label>Téléphone</label>
      <input type="text" id="companyPhone" placeholder="ex. 02 40 00 00 00">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="text" id="companyEmail" placeholder="ex. contact@menuiserie-dupont.fr">
    </div>
    <div class="field">
      <label>SIRET</label>
      <input type="text" id="companySiret" placeholder="ex. 123 456 789 00012">
    </div>
    <div class="modal-actions">
      <button class="btn btn-sage" id="btnCompanySave">Enregistrer</button>
      <button class="btn btn-line" id="btnCompanyModalClose2">Fermer</button>
    </div>
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'registre-fournisseurs-data-v1';
  let state = load();
  if(!Array.isArray(state.debitSheets)) state.debitSheets = [];
  let currentView = 'suppliers';
  let selectedSupplierId = state.suppliers[0]?.id ?? null;
  let selectedSheetId = state.debitSheets[0]?.id ?? null;
  let openProducts = new Set();
  let openNewCommentFor = null;
  let openNewProductForm = false;
  let pendingPhotos = [];
  let pendingRating = 0;
  let editingComment = null; // { pid, cid }
  let editRating = 0;
  let editText = '';
  let editPhotos = [];
  let hasUnsavedChanges = false;

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const data = JSON.parse(raw);
        migrate(data);
        return data;
      }
    }catch(e){ console.warn('Lecture stockage impossible', e); }
    return { suppliers: [], debitSheets: [], company: {} };
  }
  // Convertit les anciennes données (photo unique, note /5) vers le nouveau format (photos multiples, note /10)
  function migrate(data){
    if(!data.company || typeof data.company !== 'object') data.company = {};
    (data.suppliers||[]).forEach(s => {
      if(!s.status) s.status = 'actif';
      if(typeof s.phone !== 'string') s.phone = '';
      if(typeof s.email !== 'string') s.email = '';
      (s.products||[]).forEach(p => {
        (p.comments||[]).forEach(c => {
          if(!Array.isArray(c.photos)){
            c.photos = c.photo ? [c.photo] : [];
            delete c.photo;
          }
        });
      });
    });
    (data.debitSheets||[]).forEach(s => {
      if(typeof s.reference !== 'string' || !s.reference) s.reference = generateSheetReference(data, s);
      if(typeof s.operator !== 'string') s.operator = '';
      (s.rows||[]).forEach((r,i) => {
        if(typeof r.repere !== 'string') r.repere = 'P' + (i+1);
      });
    });
  }
  function save(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){
      toast("Stockage plein — supprimez une photo ou exportez vos données.");
    }
    hasUnsavedChanges = false;
  }
  // Avertit une seule fois par appareil que les données sont locales à ce navigateur.
  function warnLocalStorageOnce(){
    const KEY = 'rf-warned-local-storage';
    if(sessionStorage.getItem(KEY)) return;
    sessionStorage.setItem(KEY, '1');
    if(location.protocol === 'file:'){
      toast('Astuce : hébergez ce fichier en ligne (GitHub Pages) pour un accès stable depuis un lien.');
    }
  }
  function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._h);
    t._h = setTimeout(()=>t.classList.remove('show'), 2600);
  }
  function esc(s){
    return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(iso){
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'});
  }

  function allComments(product){ return product.comments || []; }
  function productAvg(product){
    const c = allComments(product);
    if(!c.length) return null;
    return c.reduce((s,x)=>s+x.rating,0) / c.length;
  }
  function supplierAvg(supplier){
    const ratings = [];
    (supplier.products||[]).forEach(p => allComments(p).forEach(c => ratings.push(c.rating)));
    if(!ratings.length) return null;
    return ratings.reduce((s,x)=>s+x,0) / ratings.length;
  }
  function ratingClass(avg){
    if(avg === null) return 'rating-none';
    if(avg >= 8) return 'rating-good';
    if(avg >= 5) return 'rating-mid';
    return 'rating-low';
  }
  function scoreLabel(rating){
    return `${rating}<span style="opacity:.55; font-weight:400;">/10</span>`;
  }

  function getSupplier(id){ return state.suppliers.find(s => s.id === id); }
  function getProduct(supplier, pid){ return (supplier.products||[]).find(p => p.id === pid); }
  function getSheet(id){ return state.debitSheets.find(s => s.id === id); }
  function newRow(nextIndex){ return { id: uid(), repere: nextIndex ? ('P'+nextIndex) : '', designation:'', longueur:'', largeur:'', epaisseur:'', quantite:1, materiau:'', observation:'' }; }
  const PIECE_LIBRARY = ['Dormant','Traverse haute','Traverse basse','Montant','Battant','Petit bois','Vitrage','Seuil','Linteau','Jambage','Panneau de remplissage','Cadre'];
  function generateSheetReference(data, forSheet){
    const year = new Date((forSheet && forSheet.date) || Date.now()).getFullYear();
    const prefix = `FD-${year}-`;
    const nums = (data.debitSheets||[])
      .filter(s => s !== forSheet && (s.reference||'').startsWith(prefix))
      .map(s => parseInt((s.reference||'').slice(prefix.length), 10))
      .filter(n => !isNaN(n));
    const next = (nums.length ? Math.max(...nums) : 0) + 1;
    return prefix + String(next).padStart(3,'0');
  }
  function sheetTotals(sheet){
    let pieces = 0, linear = 0, surface = 0;
    (sheet.rows||[]).forEach(r => {
      const l = parseFloat(r.longueur) || 0;
      const w = parseFloat(r.largeur) || 0;
      const q = parseFloat(r.quantite) || 0;
      pieces += q;
      linear += (l * q) / 1000;
      surface += (l * w * q) / 1_000_000;
    });
    return { pieces, linear, surface };
  }

  function materialSummary(rows){
    const map = {};
    const order = [];
    (rows||[]).forEach(r => {
      const key = (r.materiau||'').trim() || 'Non spécifié';
      const l = parseFloat(r.longueur) || 0;
      const w = parseFloat(r.largeur) || 0;
      const q = parseFloat(r.quantite) || 0;
      if(!map[key]){ map[key] = { pieces:0, linear:0, surface:0 }; order.push(key); }
      map[key].pieces += q;
      map[key].linear += (l * q) / 1000;
      map[key].surface += (l * w * q) / 1_000_000;
    });
    return order.map(key => ({ key, ...map[key] }));
  }

  // ---------- render ----------
  function render(){
    renderSidebar();
    renderMain();
    renderSheetSidebar();
    renderSheetMain();
  }

  function supplierMatchQuery(s, q){
    if(!q) return { match:true, hint:null };
    if((s.name||'').toLowerCase().includes(q)) return { match:true, hint:null };
    if((s.category||'').toLowerCase().includes(q)) return { match:true, hint:null };
    for(const p of (s.products||[])){
      if((p.name||'').toLowerCase().includes(q)) return { match:true, hint:p.name };
      for(const c of (p.comments||[])){
        if((c.text||'').toLowerCase().includes(q)) return { match:true, hint:p.name };
      }
    }
    return { match:false, hint:null };
  }

  const STATUS_LABELS = { actif:'Actif', test:'En test', eviter:'À éviter' };
  function statusClass(status){ return 'status-' + (status || 'actif'); }
  function statusLabel(status){ return STATUS_LABELS[status] || STATUS_LABELS.actif; }

  function renderSidebar(){
    const q = (document.getElementById('searchInput').value || '').toLowerCase().trim();
    const list = document.getElementById('supplierList');
    const matches = state.suppliers.map(s => ({ s, info: supplierMatchQuery(s, q) })).filter(x => x.info.match);
    if(!state.suppliers.length){
      list.innerHTML = `<div class="empty-side">Aucun fournisseur pour l'instant.<br>Cliquez sur « + Ajouter » pour commencer votre registre.</div>`;
      return;
    }
    if(!matches.length){
      list.innerHTML = `<div class="empty-side">Aucun résultat pour « ${esc(q)} » (nom, catégorie, produit ou commentaire).</div>`;
      return;
    }
    list.innerHTML = matches.map(({s, info}) => {
      const avg = supplierAvg(s);
      const cls = ratingClass(avg);
      const nbProducts = (s.products||[]).length;
      return `
      <div class="supplier-item ${s.id===selectedSupplierId?'active':''}" data-supplier="${s.id}" tabindex="0">
        <div class="name">${esc(s.name) || '(sans nom)'}</div>
        ${s.category ? `<div class="cat">${esc(s.category)}</div>` : ''}
        <div class="badge-row">
          <span class="mini-stamp ${cls}">${avg===null ? '—' : avg.toFixed(1)+' / 10'}</span>
          <span class="status-pill ${statusClass(s.status)}">${statusLabel(s.status)}</span>
          <span style="font-size:11px; color:var(--text-dim);">${nbProducts} produit${nbProducts!==1?'s':''}</span>
        </div>
        ${info.hint ? `<div class="search-hint">🔎 trouvé dans « ${esc(info.hint)} »</div>` : ''}
      </div>`;
    }).join('');
  }

  function renderMain(){
    const main = document.getElementById('mainArea');
    const supplier = getSupplier(selectedSupplierId);
    if(!supplier){
      main.innerHTML = `
        <div class="empty-main">
          <h2>Votre registre est vide</h2>
          <p>Ajoutez un premier fournisseur pour commencer à noter ses produits et à consigner vos observations.</p>
        </div>`;
      return;
    }
    const avg = supplierAvg(supplier);
    const cls = ratingClass(avg);
    const products = supplier.products || [];

    main.innerHTML = `
      <div class="supplier-header">
        <div class="supplier-title-block" style="flex:1; min-width:0;">
          <input class="name-input" data-field="name" value="${esc(supplier.name)}" placeholder="Nom du fournisseur">
          <input class="cat-input" data-field="category" value="${esc(supplier.category||'')}" placeholder="Catégorie (ex. emballage, matières premières…)">
          <div class="contact-row">
            <div class="contact-field">
              <input class="contact-input" data-field="phone" value="${esc(supplier.phone||'')}" placeholder="☎ Téléphone">
              ${supplier.phone ? `<a class="contact-link" href="tel:${esc(supplier.phone.replace(/\s+/g,''))}">Appeler</a>` : ''}
            </div>
            <div class="contact-field">
              <input class="contact-input" data-field="email" value="${esc(supplier.email||'')}" placeholder="✉ Email">
              ${supplier.email ? `<a class="contact-link" href="mailto:${esc(supplier.email)}">Écrire</a>` : ''}
            </div>
          </div>
        </div>
        <div class="supplier-overall">
          <select class="status-select ${statusClass(supplier.status)}" data-field="status" id="supplierStatus">
            <option value="actif" ${(supplier.status||'actif')==='actif'?'selected':''}>Actif</option>
            <option value="test" ${supplier.status==='test'?'selected':''}>En test</option>
            <option value="eviter" ${supplier.status==='eviter'?'selected':''}>À éviter</option>
          </select>
          <div class="stamp ${cls}">
            <div class="num">${avg===null?'—':avg.toFixed(1)}</div>
            <div class="lbl">/ 10 GLOBAL</div>
          </div>
          <button class="btn btn-danger" id="btnDeleteSupplier" title="Supprimer ce fournisseur">Supprimer</button>
        </div>
      </div>
      <hr class="rule">
      <div class="section-label">
        <span>Produits (${products.length})</span>
        <button class="btn btn-line" id="btnToggleNewProduct" style="padding:5px 10px; font-size:12px;">+ Nouveau produit</button>
      </div>
      ${openNewProductForm ? renderNewProductForm() : ''}
      ${products.length ? products.map(p => renderProductCard(supplier, p)).join('') : `
        <div class="empty-side" style="padding:20px 0;">Aucun produit enregistré. Ajoutez-en un pour pouvoir noter et commenter.</div>
      `}
    `;
    bindMainEvents(supplier);
  }

  function renderNewProductForm(){
    return `
      <div class="new-product-form" id="newProductForm">
        <div class="field">
          <label>Nom du produit</label>
          <input type="text" id="newProductName" placeholder="ex. Carton ondulé 40x30">
        </div>
        <div class="form-actions">
          <button class="btn btn-sage" id="btnSaveProduct">Ajouter le produit</button>
          <button class="btn btn-line" id="btnCancelProduct">Annuler</button>
        </div>
      </div>`;
  }

  function renderProductCard(supplier, product){
    const avg = productAvg(product);
    const isOpen = openProducts.has(product.id);
    const comments = allComments(product).slice().sort((a,b)=> b.date.localeCompare(a.date));
    return `
    <div class="product-card">
      <div class="product-head" data-toggle-product="${product.id}">
        <div class="product-head-left">
          <span class="chevron ${isOpen?'open':''}">▸</span>
          <div>
            <div class="product-name">${esc(product.name)}</div>
            <div class="product-meta">
              ${avg===null ? 'Aucun commentaire' : `<span class="score-badge ${ratingClass(avg)}">${avg.toFixed(1)}<span style="opacity:.55; font-weight:400;">/10</span></span> · ${comments.length} commentaire${comments.length!==1?'s':''}`}
            </div>
          </div>
        </div>
        <button class="btn btn-danger" data-delete-product="${product.id}" title="Supprimer ce produit">Supprimer</button>
      </div>
      ${isOpen ? `
      <div class="product-body">
        ${comments.map(c => renderComment(product, c)).join('') || `<div class="empty-side" style="padding:14px 0;">Pas encore de commentaire sur ce produit.</div>`}
        <div class="add-row">
          ${openNewCommentFor === product.id ? renderNewCommentForm(product) : `
            <button class="btn btn-line" data-open-comment="${product.id}" style="padding:6px 12px; font-size:12.5px;">+ Ajouter un commentaire</button>
          `}
        </div>
      </div>` : ''}
    </div>`;
  }

  function renderComment(product, c){
    const isEditing = editingComment && editingComment.pid === product.id && editingComment.cid === c.id;
    if(isEditing) return renderEditCommentForm(c);
    const photos = c.photos || [];
    return `
    <div class="comment">
      ${photos.length ? `
        <div class="comment-photos">
          ${photos.map((src, i) => `<img class="comment-photo" src="${src}" data-view-photo data-view-pid="${product.id}" data-view-cid="${c.id}" data-view-index="${i}" alt="Photo ${i+1} jointe au commentaire">`).join('')}
        </div>` : `<div class="comment-photo-placeholder"></div>`}
      <div class="comment-body">
        <div class="comment-top">
          <span class="score-badge ${ratingClass(c.rating)}">${scoreLabel(c.rating)}</span>
          <span class="comment-date mono">${fmtDate(c.date)}</span>
        </div>
        <div class="comment-text">${esc(c.text) || '<span style="color:var(--text-dim)">(sans texte)</span>'}</div>
        <div style="margin-top:6px; display:flex; gap:14px;">
          <button class="btn btn-danger" data-edit-comment="${product.id}|${c.id}" style="padding:2px 0; color:var(--ink-soft);">Modifier</button>
          <button class="btn btn-danger" data-delete-comment="${product.id}|${c.id}" style="padding:2px 0;">Supprimer</button>
        </div>
      </div>
    </div>`;
  }

  function renderEditCommentForm(c){
    return `
    <div class="new-comment-form" id="editCommentForm">
      <div class="field">
        <label>Note (1 à 10)</label>
        <div class="score-picker" id="editStarPicker">
          ${Array.from({length:10}, (_,idx)=>idx+1).map(i => `<span data-edit-star="${i}" class="${i<=editRating?'filled':''}">${i}</span>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Commentaire</label>
        <textarea id="editCommentText">${esc(editText)}</textarea>
      </div>
      <div class="field">
        <label>Photos (optionnelles)</label>
        <label class="btn btn-line" style="display:inline-block; cursor:pointer; padding:6px 12px; font-size:12.5px;">
          Ajouter des photos
          <input type="file" id="editCommentPhoto" accept="image/*" multiple>
        </label>
        ${editPhotos.length ? `
          <div class="photo-preview">
            ${editPhotos.map((src,i) => `
              <div class="photo-thumb">
                <img src="${src}" alt="Aperçu ${i+1}">
                <button class="photo-thumb-remove" data-remove-edit-photo="${i}" title="Retirer">&times;</button>
              </div>`).join('')}
          </div>` : ''}
      </div>
      <div class="form-actions">
        <button class="btn btn-sage" id="btnSaveEditComment">Enregistrer les modifications</button>
        <button class="btn btn-line" id="btnCancelEditComment">Annuler</button>
      </div>
    </div>`;
  }

  function renderNewCommentForm(product){
    return `
    <div class="new-comment-form" id="newCommentForm">
      <div class="field">
        <label>Note (1 à 10)</label>
        <div class="score-picker" id="starPicker">
          ${Array.from({length:10}, (_,idx)=>idx+1).map(i => `<span data-star="${i}" class="${i<=pendingRating?'filled':''}">${i}</span>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Commentaire</label>
        <textarea id="newCommentText" placeholder="Qualité, délai de livraison, conformité…"></textarea>
      </div>
      <div class="field">
        <label>Photos (optionnelles)</label>
        <label class="btn btn-line" style="display:inline-block; cursor:pointer; padding:6px 12px; font-size:12.5px;">
          Ajouter des photos
          <input type="file" id="newCommentPhoto" accept="image/*" multiple>
        </label>
        ${pendingPhotos.length ? `
          <div class="photo-preview">
            ${pendingPhotos.map((src,i) => `
              <div class="photo-thumb">
                <img src="${src}" alt="Aperçu ${i+1}">
                <button class="photo-thumb-remove" data-remove-pending-photo="${i}" title="Retirer">&times;</button>
              </div>`).join('')}
          </div>` : ''}
      </div>
      <div class="form-actions">
        <button class="btn btn-sage" id="btnSaveComment">Enregistrer</button>
        <button class="btn btn-line" id="btnCancelComment">Annuler</button>
      </div>
    </div>`;
  }

  // ---------- fiches de débit ----------
  function renderSheetSidebar(){
    const list = document.getElementById('sheetList');
    if(!list) return;
    const q = (document.getElementById('sheetSearchInput')?.value || '').toLowerCase();
    const filtered = state.debitSheets.filter(s => (s.title||'').toLowerCase().includes(q));
    if(!state.debitSheets.length){
      list.innerHTML = `<div class="empty-side">Aucune fiche pour l'instant.<br>Cliquez sur « + Nouvelle » pour créer votre première fiche de débit.</div>`;
      return;
    }
    if(!filtered.length){
      list.innerHTML = `<div class="empty-side">Aucun résultat pour « ${esc(q)} ».</div>`;
      return;
    }
    list.innerHTML = filtered.map(s => {
      const t = sheetTotals(s);
      return `
      <div class="sheet-item ${s.id===selectedSheetId?'active':''}" data-sheet="${s.id}" tabindex="0">
        <div class="name">${esc(s.title) || '(sans titre)'} <span class="ref-badge">${esc(s.reference||'')}</span></div>
        <div class="meta">${s.client ? esc(s.client)+' · ' : ''}${fmtDate(s.date || new Date().toISOString())}</div>
        <div class="meta">${(s.rows||[]).length} ligne${(s.rows||[]).length!==1?'s':''} · ${t.pieces} pièce${t.pieces!==1?'s':''}</div>
      </div>`;
    }).join('');
  }

  function renderSheetMain(){
    const main = document.getElementById('debitMainArea');
    if(!main) return;
    const sheet = getSheet(selectedSheetId);
    if(!sheet){
      main.innerHTML = `
        <div class="empty-main">
          <h2>Aucune fiche sélectionnée</h2>
          <p>Créez une fiche de débit pour lister les pièces à découper (menuiserie, ébénisterie…) avec leurs dimensions, puis téléchargez-la en PDF ou en CSV.</p>
        </div>`;
      return;
    }
    const rows = sheet.rows || [];
    const t = sheetTotals(sheet);
    main.innerHTML = `
      <div class="sheet-toolbar">
        <div>
          <div class="section-label" style="margin-bottom:0;"><span>Fiche de débit <span class="ref-badge">${esc(sheet.reference||'')}</span></span></div>
          <div id="saveStatus" style="font-size:11px; color:var(--text-dim); margin-top:2px;">Enregistrée automatiquement dans ce navigateur</div>
        </div>
        <div class="sheet-toolbar-actions">
          <button class="btn btn-sage" id="btnSaveSheet">Enregistrer</button>
          <button class="btn btn-line" id="btnExportSheetCsv">Télécharger CSV</button>
          <button class="btn btn-gold" id="btnPrintSheet">Télécharger PDF</button>
          <button class="btn btn-danger" id="btnDeleteSheet">Supprimer</button>
        </div>
      </div>
      <div class="sheet-header-form">
        <div class="field full">
          <label>Titre / Projet</label>
          <input type="text" id="sheetTitle" value="${esc(sheet.title||'')}" placeholder="ex. Portail double vantaux — Chantier Dupont">
        </div>
        <div class="field">
          <label>Client / Chantier</label>
          <input type="text" id="sheetClient" value="${esc(sheet.client||'')}" placeholder="ex. M. Dupont, 12 rue des Lilas">
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="sheetDate" value="${(sheet.date||'').slice(0,10)}">
        </div>
        <div class="field">
          <label>Réalisé par</label>
          <input type="text" id="sheetOperator" value="${esc(sheet.operator||'')}" placeholder="ex. J. Martin">
        </div>
        <div class="field">
          <label>N° de fiche</label>
          <input type="text" id="sheetReference" value="${esc(sheet.reference||'')}">
        </div>
        <div class="field full">
          <label>Note générale</label>
          <input type="text" id="sheetNote" value="${esc(sheet.note||'')}" placeholder="ex. Matériau principal : PVC blanc, épaisseur profilé 70mm">
        </div>
      </div>

      <div class="debit-table-wrap">
        <table class="debit-table">
          <thead>
            <tr>
              <th style="width:56px;">Repère</th>
              <th>Désignation</th>
              <th style="width:90px;">Long. (mm)</th>
              <th style="width:90px;">Larg. (mm)</th>
              <th style="width:90px;">Ép. (mm)</th>
              <th style="width:64px;">Qté</th>
              <th style="width:140px;">Matériau</th>
              <th>Observations</th>
              <th class="col-actions"></th>
            </tr>
          </thead>
          <tbody id="sheetRowsBody">
            ${rows.map(r => renderSheetRow(r)).join('') || `<tr><td colspan="9" style="color:var(--text-dim); font-size:12.5px; padding:14px 8px;">Aucune pièce. Ajoutez une ligne pour commencer le débit.</td></tr>`}
          </tbody>
        </table>
      </div>
      <div class="add-row">
        <div class="piece-library">
          <span class="piece-lib-label">Ajout rapide :</span>
          ${PIECE_LIBRARY.map(name => `<button type="button" class="piece-chip" data-add-piece="${esc(name)}">${esc(name)}</button>`).join('')}
        </div>
        <button class="btn btn-line" id="btnAddRow" style="padding:6px 12px; font-size:12.5px;">+ Ajouter une ligne vide</button>
      </div>

      <div class="totals-bar">
        <div class="tot"><span class="lbl">Total pièces</span><span class="val">${t.pieces}</span></div>

  function syncSheetFromDom(sheet){
    const titleEl = document.getElementById('sheetTitle');
    const clientEl = document.getElementById('sheetClient');
    const dateEl = document.getElementById('sheetDate');
    const noteEl = document.getElementById('sheetNote');
    const operatorEl = document.getElementById('sheetOperator');
    const referenceEl = document.getElementById('sheetReference');
    if(titleEl) sheet.title = titleEl.value;
    if(clientEl) sheet.client = clientEl.value;
    if(dateEl) sheet.date = dateEl.value ? new Date(dateEl.value).toISOString() : (sheet.date || new Date().toISOString());
    if(noteEl) sheet.note = noteEl.value;
    if(operatorEl) sheet.operator = operatorEl.value;
    if(referenceEl) sheet.reference = referenceEl.value;
    document.querySelectorAll('#sheetRowsBody [data-row]').forEach(tr => {
      const row = sheet.rows.find(r => r.id === tr.dataset.row);
      if(!row) return;
      tr.querySelectorAll('[data-row-field]').forEach(input => {
        const field = input.dataset.rowField;
        if(['longueur','largeur','epaisseur','quantite'].includes(field)){
          const num = input.value.replace(',', '.').trim();
          row[field] = num === '' ? '' : (parseFloat(num) || 0);
        } else {
          row[field] = input.value;
        }
      });
    });
  }

  function bindSheetEvents(sheet){
    const main = document.getElementById('debitMainArea');

    const saveSheetBtn = document.getElementById('btnSaveSheet');
    if(saveSheetBtn) saveSheetBtn.addEventListener('click', () => {
      syncSheetFromDom(sheet);
      save();
      renderSheetSidebar();
      toast('Fiche enregistrée ✓');
      const status = document.getElementById('saveStatus');
      if(status){
        status.textContent = 'Enregistrée à l’instant ✓';
        status.style.color = 'var(--sage)';
        setTimeout(() => {
          const s = document.getElementById('saveStatus');
          if(s){ s.textContent = 'Enregistrée automatiquement dans ce navigateur'; s.style.color = 'var(--text-dim)'; }
        }, 2500);
      }
    });

    ['sheetTitle','sheetClient','sheetNote','sheetOperator','sheetReference'].forEach(id => {
      const fieldMap = { sheetTitle:'title', sheetClient:'client', sheetNote:'note', sheetOperator:'operator', sheetReference:'reference' };
      const el = document.getElementById(id);
      if(el) el.addEventListener('change', () => {
        sheet[fieldMap[id]] = el.value;
        save(); renderSheetSidebar();
      });
    });
    const dateEl = document.getElementById('sheetDate');
    if(dateEl) dateEl.addEventListener('change', () => {
      sheet.date = dateEl.value ? new Date(dateEl.value).toISOString() : new Date().toISOString();
      save(); renderSheetSidebar();
    });

    main.querySelectorAll('[data-row-field]').forEach(input => {
      input.addEventListener('change', () => {
        const tr = input.closest('[data-row]');
        const row = sheet.rows.find(r => r.id === tr.dataset.row);
        const field = input.dataset.rowField;
        if(['longueur','largeur','epaisseur','quantite'].includes(field)){
          const num = input.value.replace(',', '.').trim();
          row[field] = num === '' ? '' : (parseFloat(num) || 0);
        } else {
          row[field] = input.value;
        }
        save();
        renderSheetSidebar();
        const totalsBar = document.querySelector('.totals-bar');
        if(totalsBar){
          const t = sheetTotals(sheet);
          totalsBar.innerHTML = `
            <div class="tot"><span class="lbl">Total pièces</span><span class="val">${t.pieces}</span></div>
            <div class="tot"><span class="lbl">Longueur cumulée</span><span class="val">${t.linear.toFixed(2)} m</span></div>
            <div class="tot"><span class="lbl">Surface cumulée</span><span class="val">${t.surface.toFixed(2)} m²</span></div>
          `;
        }
      });
    });

    const addRowBtn = document.getElementById('btnAddRow');
    if(addRowBtn) addRowBtn.addEventListener('click', () => {
      sheet.rows = sheet.rows || [];
      sheet.rows.push(newRow(sheet.rows.length + 1));
      save(); renderSheetMain(); renderSheetSidebar();
      const inputs = document.querySelectorAll('#sheetRowsBody tr:last-child input');
      if(inputs[1]) inputs[1].focus();
    });

    main.querySelectorAll('[data-add-piece]').forEach(chip => {
      chip.addEventListener('click', () => {
        sheet.rows = sheet.rows || [];
        const row = newRow(sheet.rows.length + 1);
        row.designation = chip.dataset.addPiece;
        row.quantite = 1;
        sheet.rows.push(row);
        save(); renderSheetMain(); renderSheetSidebar();
        const inputs = document.querySelectorAll('#sheetRowsBody tr:last-child input');
        if(inputs[2]) inputs[2].focus();
      });
    });

    main.querySelectorAll('[data-delete-row]').forEach(btn => {
      btn.addEventListener('click', () => {
        sheet.rows = (sheet.rows||[]).filter(r => r.id !== btn.dataset.deleteRow);
        save(); renderSheetMain(); renderSheetSidebar();
      });
    });

    const delSheetBtn = document.getElementById('btnDeleteSheet');
    if(delSheetBtn) delSheetBtn.addEventListener('click', () => {
      if(!confirm(`Supprimer la fiche « ${sheet.title || '(sans titre)'} » ?`)) return;
      state.debitSheets = state.debitSheets.filter(s => s.id !== sheet.id);
      selectedSheetId = state.debitSheets[0]?.id ?? null;
      save(); render();
    });

    const csvBtn = document.getElementById('btnExportSheetCsv');
    if(csvBtn) csvBtn.addEventListener('click', () => { syncSheetFromDom(sheet); save(); exportSheetCsv(sheet); });

    const printBtn = document.getElementById('btnPrintSheet');
    if(printBtn) printBtn.addEventListener('click', () => { syncSheetFromDom(sheet); save(); printSheet(sheet); });
  }

  function exportSheetCsv(sheet){
    const meta = [
      `Fiche;${sheet.reference||''}`,
      `Titre;${sheet.title||''}`,
      `Client;${sheet.client||''}`,
      `Date;${fmtDate(sheet.date || new Date().toISOString())}`,
      `Réalisé par;${sheet.operator||''}`
    ];
    const headers = ['Repère','Désignation','Longueur (mm)','Largeur (mm)','Épaisseur (mm)','Quantité','Matériau','Observations'];
    const lines = [...meta, '', headers.join(';')];
    (sheet.rows||[]).forEach(r => {
      const vals = [r.repere, r.designation, r.longueur, r.largeur, r.epaisseur, r.quantite, r.materiau, r.observation]
        .map(v => `"${String(v ?? '').replace(/"/g,'""')}"`);
      lines.push(vals.join(';'));
    });
    const csv = '\uFEFF' + lines.join('\r\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const safeName = (sheet.title || 'fiche-de-debit').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
    a.href = url; a.download = `${safeName || 'fiche-de-debit'}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    toast('CSV téléchargé.');
  }

    });
    const cancelProductBtn = document.getElementById('btnCancelProduct');
    if(cancelProductBtn) cancelProductBtn.addEventListener('click', () => { openNewProductForm = false; hasUnsavedChanges = false; render(); });

    main.querySelectorAll('[data-toggle-product]').forEach(el => {
      el.addEventListener('click', e => {
        if(e.target.closest('[data-delete-product]')) return;
        const pid = el.dataset.toggleProduct;
        if(openProducts.has(pid)) openProducts.delete(pid); else openProducts.add(pid);
        render();
      });
    });

    main.querySelectorAll('[data-delete-product]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const pid = el.dataset.deleteProduct;
        const product = getProduct(supplier, pid);
        if(!confirm(`Supprimer le produit « ${product.name} » et ses commentaires ?`)) return;
        supplier.products = supplier.products.filter(p => p.id !== pid);
        save(); render();
      });
    });

    main.querySelectorAll('[data-open-comment]').forEach(el => {
      el.addEventListener('click', () => {
        openNewCommentFor = el.dataset.openComment;
        pendingRating = 0; pendingPhotos = [];
        editingComment = null;
        render();
      });
    });

    const cancelCommentBtn = document.getElementById('btnCancelComment');
    if(cancelCommentBtn) cancelCommentBtn.addEventListener('click', () => {
      openNewCommentFor = null; pendingPhotos = []; pendingRating = 0; hasUnsavedChanges = false; render();
    });

    const starPicker = document.getElementById('starPicker');
    if(starPicker) starPicker.addEventListener('click', e => {
      const star = e.target.closest('[data-star]');
      if(!star) return;
      pendingRating = parseInt(star.dataset.star, 10);
      render();
      const ta = document.getElementById('newCommentText');
      if(ta) ta.focus();
    });

    const photoInput = document.getElementById('newCommentPhoto');
    if(photoInput) photoInput.addEventListener('change', e => {
      const files = Array.from(e.target.files || []);
      if(!files.length) return;
      let remaining = files.length;
      files.forEach(file => {
        resizeImage(file, dataUrl => {
          pendingPhotos.push(dataUrl);
          remaining--;
          if(remaining === 0) render();
        });
      });
    });
    main.querySelectorAll('[data-remove-pending-photo]').forEach(el => {
      el.addEventListener('click', () => {
        pendingPhotos.splice(parseInt(el.dataset.removePendingPhoto, 10), 1);
        render();
      });
    });

    const saveCommentBtn = document.getElementById('btnSaveComment');
    if(saveCommentBtn) saveCommentBtn.addEventListener('click', () => {
      if(pendingRating === 0){ toast('Choisissez une note de 1 à 10.'); return; }
      const product = getProduct(supplier, openNewCommentFor);
      const text = document.getElementById('newCommentText').value.trim();
      product.comments = product.comments || [];
      product.comments.push({
        id: uid(),
        rating: pendingRating,
        text,
        photos: pendingPhotos.slice(),
        date: new Date().toISOString()
      });
      openNewCommentFor = null; pendingPhotos = []; pendingRating = 0;
      save(); render();
    });

    main.querySelectorAll('[data-edit-comment]').forEach(el => {
      el.addEventListener('click', () => {
        const [pid, cid] = el.dataset.editComment.split('|');
        const product = getProduct(supplier, pid);
        const c = product.comments.find(x => x.id === cid);
        editingComment = { pid, cid };
        editRating = c.rating;
        editText = c.text || '';
        editPhotos = (c.photos || []).slice();
        openNewCommentFor = null;
        render();
      });
    });

    const cancelEditBtn = document.getElementById('btnCancelEditComment');
    if(cancelEditBtn) cancelEditBtn.addEventListener('click', () => {
      editingComment = null; hasUnsavedChanges = false; render();
    });

    const editStarPicker = document.getElementById('editStarPicker');
    if(editStarPicker) editStarPicker.addEventListener('click', e => {
      const star = e.target.closest('[data-edit-star]');
      if(!star) return;
      editRating = parseInt(star.dataset.editStar, 10);
      const ta = document.getElementById('editCommentText');
      editText = ta ? ta.value : editText;
      render();
    });

    const editTextArea = document.getElementById('editCommentText');
    if(editTextArea) editTextArea.addEventListener('input', e => { editText = e.target.value; });

    const editPhotoInput = document.getElementById('editCommentPhoto');
    if(editPhotoInput) editPhotoInput.addEventListener('change', e => {
      const files = Array.from(e.target.files || []);
      if(!files.length) return;
      let remaining = files.length;
      files.forEach(file => {
        resizeImage(file, dataUrl => {
          editPhotos.push(dataUrl);
          remaining--;
          if(remaining === 0) render();
        });
      });
    });
    main.querySelectorAll('[data-remove-edit-photo]').forEach(el => {
      el.addEventListener('click', () => {
        editPhotos.splice(parseInt(el.dataset.removeEditPhoto, 10), 1);
        render();
      });
    });

    const saveEditBtn = document.getElementById('btnSaveEditComment');
    if(saveEditBtn) saveEditBtn.addEventListener('click', () => {
      if(editRating === 0){ toast('Choisissez une note de 1 à 10.'); return; }
      const { pid, cid } = editingComment;
      const product = getProduct(supplier, pid);
      const c = product.comments.find(x => x.id === cid);
      const ta = document.getElementById('editCommentText');
      c.rating = editRating;
      c.text = ta ? ta.value.trim() : editText.trim();
      c.photos = editPhotos.slice();
      editingComment = null;
      save(); render();
    });

    main.querySelectorAll('[data-delete-comment]').forEach(el => {
      el.addEventListener('click', () => {
        const [pid, cid] = el.dataset.deleteComment.split('|');
        const product = getProduct(supplier, pid);
        if(!confirm('Supprimer ce commentaire ?')) return;
        product.comments = product.comments.filter(c => c.id !== cid);
        save(); render();
      });
    });

    main.querySelectorAll('[data-view-photo]').forEach(el => {
      el.addEventListener('click', () => {
        const pid = el.dataset.viewPid, cid = el.dataset.viewCid;
        const index = parseInt(el.dataset.viewIndex, 10);
        const product = getProduct(supplier, pid);
        const c = product.comments.find(x => x.id === cid);
        openLightbox((c.photos || []), index);
      });
    });
  }

  function resizeImage(file, cb){
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 900;
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        cb(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  // Redimensionne un logo en conservant la transparence (PNG), pour un rendu propre sur le PDF
  function resizeLogo(file, cb){
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 360;
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        cb(canvas.toDataURL('image/png'));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  function openLightbox(photos, startIndex){
    if(!photos || !photos.length) return;
    let index = startIndex || 0;
    const box = document.createElement('div');
    box.className = 'lightbox';
    function paint(){
      box.innerHTML = `
        <button class="close" aria-label="Fermer">&times;</button>
        ${photos.length > 1 ? `<button class="lb-nav lb-prev" aria-label="Photo précédente">&#8249;</button>` : ''}
        <img src="${photos[index]}" alt="Photo agrandie ${index+1} sur ${photos.length}">
        ${photos.length > 1 ? `<button class="lb-nav lb-next" aria-label="Photo suivante">&#8250;</button>
        <div class="lb-count mono">${index+1} / ${photos.length}</div>` : ''}
      `;
    }
    paint();
    box.addEventListener('click', e => {
      if(e.target === box || e.target.classList.contains('close')) { box.remove(); return; }
      if(e.target.classList.contains('lb-prev')){ index = (index - 1 + photos.length) % photos.length; paint(); return; }
      if(e.target.classList.contains('lb-next')){ index = (index + 1) % photos.length; paint(); return; }
    });
    document.body.appendChild(box);
  }

  render();
  warnLocalStorageOnce();

  // Alerte avant de fermer l'onglet si des champs ont été modifiés sans être encore enregistrés
  const DIRTY_FIELD_SELECTOR = '.name-input, .cat-input, .contact-input, #sheetTitle, #sheetClient, #sheetDate, #sheetNote, #sheetOperator, #sheetReference, #sheetRowsBody input, #newCommentText, #editCommentText, #newProductName';
  document.body.addEventListener('input', e => {
    if(e.target.matches && e.target.matches(DIRTY_FIELD_SELECTOR)) hasUnsavedChanges = true;
  });
  window.addEventListener('beforeunload', e => {
    if(hasUnsavedChanges){
      e.preventDefault();
      e.returnValue = '';
    }
  });
})();
</script>
</body>
