<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Registre Fournisseurs — évaluez vos fournisseurs, notez leurs produits et gardez vos commentaires illustrés de photos.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📋</text></svg>">
<title>Registre Fournisseurs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2A4A;
    --ink-soft:#33456B;
    --paper:#F2EFE6;
    --paper-raised:#FBFAF5;
    --gold:#B8912A;
    --sage:#5F7455;
    --brick:#A63D2F;
    --line:#D9D3C1;
    --text-dim:#7A7566;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  header.top{
    background:var(--ink);
    color:var(--paper-raised);
    padding:22px 24px 20px;
    position:sticky; top:0; z-index:20;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
  }
  .top-row{display:flex; align-items:center; justify-content:space-between; gap:16px; max-width:1100px; margin:0 auto;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand .stamp-mark{
    width:38px; height:38px; border-radius:50%;
    border:2px solid var(--gold);
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces',serif; font-weight:700; font-size:15px; color:var(--gold);
    transform:rotate(-6deg);
    flex-shrink:0;
  }
  .brand h1{font-size:20px; margin:0; letter-spacing:.02em; font-weight:600;}
  .brand p{margin:2px 0 0; font-size:12px; color:#B9C2D6; letter-spacing:.04em;}
  .top-actions{display:flex; gap:8px;}
  .view-tabs{display:flex; gap:6px; max-width:1100px; margin:14px auto 0; border-bottom:1px solid #35447A;}
  .view-tab{
    background:transparent; border:none; color:#AEB9D4; font-family:'IBM Plex Sans',sans-serif;
    font-size:13.5px; font-weight:500; padding:9px 4px; cursor:pointer; position:relative; margin-right:18px;
  }
  .view-tab:hover{color:#fff;}
  .view-tab.active{color:#fff;}
  .view-tab.active::after{
    content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--gold);
  }
  .btn{
    border:1px solid transparent; border-radius:3px; cursor:pointer;
    font-family:'IBM Plex Sans',sans-serif; font-size:13px; font-weight:500;
    padding:8px 14px; transition:transform .12s ease, background .15s ease;
  }
  .btn:active{transform:translateY(1px);}
  .btn-ghost{background:transparent; border-color:#4A5C82; color:#DCE2F0;}
  .btn-ghost:hover{background:#26365A;}
  .btn-gold{background:var(--gold); color:#221904;}
  .btn-gold:hover{background:#C9A230;}
  .btn-sage{background:var(--sage); color:#F5F7F1;}
  .btn-sage:hover{background:#6D8560;}
  .btn-line{background:transparent; border-color:var(--line); color:var(--ink);}
  .btn-line:hover{background:#E9E4D3;}
  .btn-danger{background:transparent; color:var(--brick); border-color:transparent; padding:4px 8px; font-size:12px;}
  .btn-danger:hover{text-decoration:underline;}
  input[type=file].btn-line{display:none;}

  .layout{display:flex; max-width:1100px; margin:0 auto; min-height:calc(100vh - 90px);}
  .sidebar{
    width:280px; flex-shrink:0; padding:22px 18px; border-right:1px solid var(--line);
  }
  .sidebar-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;}
  .sidebar-head span{font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim);}
  .search{
    width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:3px;
    background:var(--paper-raised); font-family:'IBM Plex Sans'; font-size:13px; margin-bottom:14px;
  }
  .supplier-item{
    padding:10px 12px; border-radius:4px; cursor:pointer; margin-bottom:4px;
    border:1px solid transparent; transition:background .12s ease;
  }
  .supplier-item:hover{background:#E9E4D3;}
  .supplier-item.active{background:var(--paper-raised); border-color:var(--line); box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .supplier-item .name{font-weight:600; font-size:14px;}
  .supplier-item .cat{font-size:11px; color:var(--text-dim); margin-top:2px;}
  .supplier-item .badge-row{display:flex; align-items:center; gap:6px; margin-top:6px;}
  .mini-stamp{
    font-family:'IBM Plex Mono',monospace; font-size:10.5px; font-weight:500;
    padding:1px 6px; border-radius:9px; border:1px solid currentColor;
  }
  .empty-side{font-size:12.5px; color:var(--text-dim); padding:8px 4px; line-height:1.5;}

  .sheet-item{
    padding:10px 12px; border-radius:4px; cursor:pointer; margin-bottom:4px;
    border:1px solid transparent; transition:background .12s ease;
  }
  .sheet-item:hover{background:#E9E4D3;}
  .sheet-item.active{background:var(--paper-raised); border-color:var(--line); box-shadow:0 1px 3px rgba(0,0,0,.06);}
  .sheet-item .name{font-weight:600; font-size:14px;}
  .sheet-item .meta{font-size:11px; color:var(--text-dim); margin-top:2px;}

  .main{flex:1; padding:26px 30px 60px; min-width:0;}
  .empty-main{
    text-align:center; padding:90px 20px; color:var(--text-dim);
  }
  .empty-main h2{font-family:'Fraunces',serif; font-size:22px; color:var(--ink); margin-bottom:6px;}

  .supplier-header{display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:6px;}
  .supplier-title-block input.name-input{
    font-family:'Fraunces',serif; font-size:28px; font-weight:600; border:none; background:transparent;
    color:var(--ink); padding:2px 0; width:100%;
  }
  .supplier-title-block input.name-input:focus{outline:none; border-bottom:1px solid var(--gold);}
  .cat-input{
    border:none; background:transparent; font-size:12.5px; color:var(--text-dim); letter-spacing:.04em;
    text-transform:uppercase; margin-top:2px; width:100%;
  }
  .cat-input:focus{outline:none; border-bottom:1px solid var(--line);}
  .supplier-overall{display:flex; align-items:center; gap:10px; flex-shrink:0;}

  .stamp{
    width:64px; height:64px; border-radius:50%;
    border:3px double currentColor;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transform:rotate(-5deg); flex-shrink:0;
  }
  .stamp .num{font-family:'Fraunces',serif; font-size:20px; font-weight:700; line-height:1;}
  .stamp .lbl{font-family:'IBM Plex Mono',monospace; font-size:8px; letter-spacing:.06em; margin-top:1px;}
  .rating-good{color:var(--sage);}
  .rating-mid{color:var(--gold);}
  .rating-low{color:var(--brick);}
  .rating-none{color:var(--text-dim);}

  hr.rule{border:none; border-top:1px solid var(--line); margin:18px 0 22px;}

  .section-label{
    font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--text-dim);
    display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;
  }

  .product-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:5px;
    margin-bottom:14px; overflow:hidden;
  }
  .product-head{
    display:flex; justify-content:space-between; align-items:center; gap:12px;
    padding:14px 16px; cursor:pointer;
  }
  .product-head:hover{background:#F5F3EB;}
  .product-head-left{display:flex; align-items:center; gap:12px; min-width:0;}
  .product-name{font-weight:600; font-size:15px;}
  .product-meta{font-size:11.5px; color:var(--text-dim); margin-top:2px;}
  .stars{display:inline-flex; gap:1px; font-size:13px; letter-spacing:1px;}
  .chevron{transition:transform .15s ease; color:var(--text-dim); flex-shrink:0;}
  .chevron.open{transform:rotate(90deg);}

  .product-body{padding:0 16px 16px; border-top:1px solid var(--line);}
  .comment{
    display:flex; gap:12px; padding:14px 0; border-bottom:1px dashed var(--line);
  }
  .comment:last-child{border-bottom:none;}
  .comment-photos{display:flex; flex-wrap:wrap; gap:6px; width:74px; flex-shrink:0;}
  .comment-photo{
    width:34px; height:34px; border-radius:3px; object-fit:cover; flex-shrink:0;
    border:1px solid var(--line); cursor:pointer;
  }
  .comment-photo-placeholder{
    width:74px; height:34px; border-radius:3px; flex-shrink:0; background:#EDE9DB;
  }
  .comment-body{flex:1; min-width:0;}
  .comment-top{display:flex; justify-content:space-between; align-items:flex-start; gap:8px;}
  .comment-date{font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--text-dim);}
  .comment-text{font-size:13.5px; line-height:1.5; margin-top:4px; white-space:pre-wrap;}

  .add-row{margin-top:10px;}
  .new-product-form, .new-comment-form, .sheet-form{
    background:#EFEADA; border:1px solid var(--line); border-radius:4px; padding:14px; margin-top:10px;
  }
  .field{margin-bottom:10px;}
  .field label{display:block; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--text-dim); margin-bottom:4px;}
  .field input[type=text], .field textarea{
    width:100%; padding:8px 10px; border:1px solid var(--line); border-radius:3px;
    font-family:'IBM Plex Sans'; font-size:13.5px; background:var(--paper-raised); resize:vertical;
  }
  .field textarea{min-height:64px;}
  .score-badge{
    font-family:'Fraunces',serif; font-weight:600; font-size:14px;
    padding:2px 8px; border-radius:9px; border:1px solid currentColor;
  }
  .score-picker{display:flex; flex-wrap:wrap; gap:6px; cursor:pointer;}
  .score-picker span{
    width:30px; height:30px; border-radius:4px; border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--text-dim);
    background:var(--paper-raised); transition:background .12s ease, color .12s ease, border-color .12s ease;
  }
  .score-picker span:hover{border-color:var(--gold);}
  .score-picker span.filled{background:var(--gold); border-color:var(--gold); color:#221904; font-weight:600;}
  .form-actions{display:flex; gap:8px; margin-top:12px; align-items:center;}
  .photo-preview{display:flex; flex-wrap:wrap; gap:10px; margin-top:8px;}
  .photo-thumb{position:relative; width:56px; height:56px;}
  .photo-thumb img{width:56px; height:56px; object-fit:cover; border-radius:3px; border:1px solid var(--line); display:block;}
  .photo-thumb-remove{
    position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%;
    background:var(--brick); color:#fff; border:none; cursor:pointer; font-size:12px; line-height:1;
    display:flex; align-items:center; justify-content:center; padding:0;
  }

  .lightbox{
    position:fixed; inset:0; background:rgba(27,42,74,.92); display:flex; align-items:center; justify-content:center;
    z-index:100; padding:30px;
  }
  .lightbox img{max-width:90vw; max-height:85vh; border-radius:4px;}
  .lightbox .close{position:absolute; top:20px; right:26px; color:#fff; font-size:28px; cursor:pointer; background:none; border:none;}
  .lb-nav{
    position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.12); border:none;
    color:#fff; width:44px; height:44px; border-radius:50%; font-size:26px; cursor:pointer; line-height:1;
  }
  .lb-nav:hover{background:rgba(255,255,255,.22);}
  .lb-prev{left:20px;}
  .lb-next{right:20px;}
  .lb-count{position:absolute; bottom:20px; left:50%; transform:translateX(-50%); color:#fff; font-size:12px; opacity:.8;}

  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; padding:10px 18px; border-radius:4px; font-size:13px;
    opacity:0; pointer-events:none; transition:opacity .25s ease, transform .25s ease; z-index:200;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(-4px);}

  @media (max-width:760px){
    .layout{flex-direction:column;}
    .sidebar{width:100%; border-right:none; border-bottom:1px solid var(--line);}
    .main{padding:20px 16px 60px;}
  }

  button:focus-visible, input:focus-visible, textarea:focus-visible, .supplier-item:focus-visible{
    outline:2px solid var(--gold); outline-offset:2px;
  }
</style>
</head>
<body>

<header class="top">
  <div class="top-row">
    <div class="brand">
      <div class="stamp-mark">RF</div>
      <div>
        <h1>Registre Fournisseurs</h1>
        <p>Évaluations &amp; observations produit</p>
      </div>
    </div>
    <div class="top-actions">
      <button class="btn btn-ghost" id="btnExport">Exporter</button>
      <label class="btn btn-ghost" style="cursor:pointer;">
        Importer
        <input type="file" id="btnImport" accept="application/json" style="display:none;">
      </label>
    </div>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" data-view="suppliers">Fournisseurs</button>
    <button class="view-tab" data-view="debit">Fiches de débit</button>
  </div>
</header>

<div class="layout" id="layoutSuppliers">
  <aside class="sidebar">
    <div class="sidebar-head">
      <span>Fournisseurs</span>
      <button class="btn btn-gold" id="btnAddSupplier" style="padding:5px 10px; font-size:12px;">+ Ajouter</button>
    </div>
    <input class="search" id="searchInput" placeholder="Rechercher un fournisseur…">
    <div id="supplierList"></div>
  </aside>

  <main class="main" id="mainArea"></main>
</div>

<div class="layout" id="layoutDebit" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-head">
      <span>Fiches de débit</span>
      <button class="btn btn-gold" id="btnAddSheet" style="padding:5px 10px; font-size:12px;">+ Nouvelle</button>
    </div>
    <input class="search" id="sheetSearchInput" placeholder="Rechercher une fiche…">
    <div id="sheetList"></div>
  </aside>

  <main class="main" id="debitMainArea"></main>
</div>

<div id="toast" class="toast"></div>

<script>
(function(){
  const STORAGE_KEY = 'registre-fournisseurs-data-v1';
  let state = load();
  let selectedSupplierId = state.suppliers[0]?.id ?? null;
  let openProducts = new Set();
  let openNewCommentFor = null;
  let openNewProductForm = false;
  let pendingPhotos = [];
  let pendingRating = 0;
  let editingComment = null; // { pid, cid }
  let editRating = 0;
  let editText = '';
  let editPhotos = [];

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        const data = JSON.parse(raw);
        migrate(data);
        return data;
      }
    }catch(e){ console.warn('Lecture stockage impossible', e); }
    return { suppliers: [] };
  }
  // Convertit les anciennes données (photo unique, note /5) vers le nouveau format (photos multiples, note /10)
  function migrate(data){
    (data.suppliers||[]).forEach(s => {
      (s.products||[]).forEach(p => {
        (p.comments||[]).forEach(c => {
          if(!Array.isArray(c.photos)){
            c.photos = c.photo ? [c.photo] : [];
            delete c.photo;
          }
        });
      });
    });
  }
  function save(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){
      toast("Stockage plein — supprimez une photo ou exportez vos données.");
    }
  }
  // Avertit une seule fois par appareil que les données sont locales à ce navigateur.
  function warnLocalStorageOnce(){
    const KEY = 'rf-warned-local-storage';
    if(sessionStorage.getItem(KEY)) return;
    sessionStorage.setItem(KEY, '1');
    if(location.protocol === 'file:'){
      toast('Astuce : hébergez ce fichier en ligne (GitHub Pages) pour un accès stable depuis un lien.');
    }
  }
  function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36); }
  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._h);
    t._h = setTimeout(()=>t.classList.remove('show'), 2600);
  }
  function esc(s){
    return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function fmtDate(iso){
    const d = new Date(iso);
    return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'short', year:'numeric'});
  }

  function allComments(product){ return product.comments || []; }
  function productAvg(product){
    const c = allComments(product);
    if(!c.length) return null;
    return c.reduce((s,x)=>s+x.rating,0) / c.length;
  }
  function supplierAvg(supplier){
    const ratings = [];
    (supplier.products||[]).forEach(p => allComments(p).forEach(c => ratings.push(c.rating)));
    if(!ratings.length) return null;
    return ratings.reduce((s,x)=>s+x,0) / ratings.length;
  }
  function ratingClass(avg){
    if(avg === null) return 'rating-none';
    if(avg >= 8) return 'rating-good';
    if(avg >= 5) return 'rating-mid';
    return 'rating-low';
  }
  function scoreLabel(rating){
    return `${rating}<span style="opacity:.55; font-weight:400;">/10</span>`;
  }

  function getSupplier(id){ return state.suppliers.find(s => s.id === id); }
  function getProduct(supplier, pid){ return (supplier.products||[]).find(p => p.id === pid); }

  // ---------- render ----------
  function render(){
    renderSidebar();
    renderMain();
  }

  function renderSidebar(){
    const q = (document.getElementById('searchInput').value || '').toLowerCase();
    const list = document.getElementById('supplierList');
    const filtered = state.suppliers.filter(s => s.name.toLowerCase().includes(q));
    if(!state.suppliers.length){
      list.innerHTML = `<div class="empty-side">Aucun fournisseur pour l'instant.<br>Cliquez sur « + Ajouter » pour commencer votre registre.</div>`;
      return;
    }
    if(!filtered.length){
      list.innerHTML = `<div class="empty-side">Aucun résultat pour « ${esc(q)} ».</div>`;
      return;
    }
    list.innerHTML = filtered.map(s => {
      const avg = supplierAvg(s);
      const cls = ratingClass(avg);
      const nbProducts = (s.products||[]).length;
      return `
      <div class="supplier-item ${s.id===selectedSupplierId?'active':''}" data-supplier="${s.id}" tabindex="0">
        <div class="name">${esc(s.name) || '(sans nom)'}</div>
        ${s.category ? `<div class="cat">${esc(s.category)}</div>` : ''}
        <div class="badge-row">
          <span class="mini-stamp ${cls}">${avg===null ? '—' : avg.toFixed(1)+' / 10'}</span>
          <span style="font-size:11px; color:var(--text-dim);">${nbProducts} produit${nbProducts!==1?'s':''}</span>
        </div>
      </div>`;
    }).join('');
  }

  function renderMain(){
    const main = document.getElementById('mainArea');
    const supplier = getSupplier(selectedSupplierId);
    if(!supplier){
      main.innerHTML = `
        <div class="empty-main">
          <h2>Votre registre est vide</h2>
          <p>Ajoutez un premier fournisseur pour commencer à noter ses produits et à consigner vos observations.</p>
        </div>`;
      return;
    }
    const avg = supplierAvg(supplier);
    const cls = ratingClass(avg);
    const products = supplier.products || [];

    main.innerHTML = `
      <div class="supplier-header">
        <div class="supplier-title-block" style="flex:1; min-width:0;">
          <input class="name-input" data-field="name" value="${esc(supplier.name)}" placeholder="Nom du fournisseur">
          <input class="cat-input" data-field="category" value="${esc(supplier.category||'')}" placeholder="Catégorie (ex. emballage, matières premières…)">
        </div>
        <div class="supplier-overall">
          <div class="stamp ${cls}">
            <div class="num">${avg===null?'—':avg.toFixed(1)}</div>
            <div class="lbl">/ 10 GLOBAL</div>
          </div>
          <button class="btn btn-danger" id="btnDeleteSupplier" title="Supprimer ce fournisseur">Supprimer</button>
        </div>
      </div>
      <hr class="rule">
      <div class="section-label">
        <span>Produits (${products.length})</span>
        <button class="btn btn-line" id="btnToggleNewProduct" style="padding:5px 10px; font-size:12px;">+ Nouveau produit</button>
      </div>
      ${openNewProductForm ? renderNewProductForm() : ''}
      ${products.length ? products.map(p => renderProductCard(supplier, p)).join('') : `
        <div class="empty-side" style="padding:20px 0;">Aucun produit enregistré. Ajoutez-en un pour pouvoir noter et commenter.</div>
      `}
    `;
    bindMainEvents(supplier);
  }

  function renderNewProductForm(){
    return `
      <div class="new-product-form" id="newProductForm">
        <div class="field">
          <label>Nom du produit</label>
          <input type="text" id="newProductName" placeholder="ex. Carton ondulé 40x30">
        </div>
        <div class="form-actions">
          <button class="btn btn-sage" id="btnSaveProduct">Ajouter le produit</button>
          <button class="btn btn-line" id="btnCancelProduct">Annuler</button>
        </div>
      </div>`;
  }

  function renderProductCard(supplier, product){
    const avg = productAvg(product);
    const isOpen = openProducts.has(product.id);
    const comments = allComments(product).slice().sort((a,b)=> b.date.localeCompare(a.date));
    return `
    <div class="product-card">
      <div class="product-head" data-toggle-product="${product.id}">
        <div class="product-head-left">
          <span class="chevron ${isOpen?'open':''}">▸</span>
          <div>
            <div class="product-name">${esc(product.name)}</div>
            <div class="product-meta">
              ${avg===null ? 'Aucun commentaire' : `<span class="score-badge ${ratingClass(avg)}">${avg.toFixed(1)}<span style="opacity:.55; font-weight:400;">/10</span></span> · ${comments.length} commentaire${comments.length!==1?'s':''}`}
            </div>
          </div>
        </div>
        <button class="btn btn-danger" data-delete-product="${product.id}" title="Supprimer ce produit">Supprimer</button>
      </div>
      ${isOpen ? `
      <div class="product-body">
        ${comments.map(c => renderComment(product, c)).join('') || `<div class="empty-side" style="padding:14px 0;">Pas encore de commentaire sur ce produit.</div>`}
        <div class="add-row">
          ${openNewCommentFor === product.id ? renderNewCommentForm(product) : `
            <button class="btn btn-line" data-open-comment="${product.id}" style="padding:6px 12px; font-size:12.5px;">+ Ajouter un commentaire</button>
          `}
        </div>
      </div>` : ''}
    </div>`;
  }

  function renderComment(product, c){
    const isEditing = editingComment && editingComment.pid === product.id && editingComment.cid === c.id;
    if(isEditing) return renderEditCommentForm(c);
    const photos = c.photos || [];
    return `
    <div class="comment">
      ${photos.length ? `
        <div class="comment-photos">
          ${photos.map((src, i) => `<img class="comment-photo" src="${src}" data-view-photo data-view-pid="${product.id}" data-view-cid="${c.id}" data-view-index="${i}" alt="Photo ${i+1} jointe au commentaire">`).join('')}
        </div>` : `<div class="comment-photo-placeholder"></div>`}
      <div class="comment-body">
        <div class="comment-top">
          <span class="score-badge ${ratingClass(c.rating)}">${scoreLabel(c.rating)}</span>
          <span class="comment-date mono">${fmtDate(c.date)}</span>
        </div>
        <div class="comment-text">${esc(c.text) || '<span style="color:var(--text-dim)">(sans texte)</span>'}</div>
        <div style="margin-top:6px; display:flex; gap:14px;">
          <button class="btn btn-danger" data-edit-comment="${product.id}|${c.id}" style="padding:2px 0; color:var(--ink-soft);">Modifier</button>
          <button class="btn btn-danger" data-delete-comment="${product.id}|${c.id}" style="padding:2px 0;">Supprimer</button>
        </div>
      </div>
    </div>`;
  }

  function renderEditCommentForm(c){
    return `
    <div class="new-comment-form" id="editCommentForm">
      <div class="field">
        <label>Note (1 à 10)</label>
        <div class="score-picker" id="editStarPicker">
          ${Array.from({length:10}, (_,idx)=>idx+1).map(i => `<span data-edit-star="${i}" class="${i<=editRating?'filled':''}">${i}</span>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Commentaire</label>
        <textarea id="editCommentText">${esc(editText)}</textarea>
      </div>
      <div class="field">
        <label>Photos (optionnelles)</label>
        <label class="btn btn-line" style="display:inline-block; cursor:pointer; padding:6px 12px; font-size:12.5px;">
          Ajouter des photos
          <input type="file" id="editCommentPhoto" accept="image/*" multiple>
        </label>
        ${editPhotos.length ? `
          <div class="photo-preview">
            ${editPhotos.map((src,i) => `
              <div class="photo-thumb">
                <img src="${src}" alt="Aperçu ${i+1}">
                <button class="photo-thumb-remove" data-remove-edit-photo="${i}" title="Retirer">&times;</button>
              </div>`).join('')}
          </div>` : ''}
      </div>
      <div class="form-actions">
        <button class="btn btn-sage" id="btnSaveEditComment">Enregistrer les modifications</button>
        <button class="btn btn-line" id="btnCancelEditComment">Annuler</button>
      </div>
    </div>`;
  }

  function renderNewCommentForm(product){
    return `
    <div class="new-comment-form" id="newCommentForm">
      <div class="field">
        <label>Note (1 à 10)</label>
        <div class="score-picker" id="starPicker">
          ${Array.from({length:10}, (_,idx)=>idx+1).map(i => `<span data-star="${i}" class="${i<=pendingRating?'filled':''}">${i}</span>`).join('')}
        </div>
      </div>
      <div class="field">
        <label>Commentaire</label>
        <textarea id="newCommentText" placeholder="Qualité, délai de livraison, conformité…"></textarea>
      </div>
      <div class="field">
        <label>Photos (optionnelles)</label>
        <label class="btn btn-line" style="display:inline-block; cursor:pointer; padding:6px 12px; font-size:12.5px;">
          Ajouter des photos
          <input type="file" id="newCommentPhoto" accept="image/*" multiple>
        </label>
        ${pendingPhotos.length ? `
          <div class="photo-preview">
            ${pendingPhotos.map((src,i) => `
              <div class="photo-thumb">
                <img src="${src}" alt="Aperçu ${i+1}">
                <button class="photo-thumb-remove" data-remove-pending-photo="${i}" title="Retirer">&times;</button>
              </div>`).join('')}
          </div>` : ''}
      </div>
      <div class="form-actions">
        <button class="btn btn-sage" id="btnSaveComment">Enregistrer</button>
        <button class="btn btn-line" id="btnCancelComment">Annuler</button>
      </div>
    </div>`;
  }

  // ---------- events ----------
  document.getElementById('searchInput').addEventListener('input', renderSidebar);

  document.getElementById('supplierList').addEventListener('click', e => {
    const item = e.target.closest('[data-supplier]');
    if(!item) return;
    selectedSupplierId = item.dataset.supplier;
    openProducts.clear();
    openNewCommentFor = null;
    openNewProductForm = false;
    render();
  });

  document.getElementById('btnAddSupplier').addEventListener('click', () => {
    const s = { id: uid(), name: 'Nouveau fournisseur', category: '', products: [] };
    state.suppliers.unshift(s);
    selectedSupplierId = s.id;
    save(); render();
    const input = document.querySelector('.name-input');
    if(input){ input.focus(); input.select(); }
  });

  document.getElementById('btnExport').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'registre-fournisseurs.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Export téléchargé.');
  });

  document.getElementById('btnImport').addEventListener('change', e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const imported = JSON.parse(reader.result);
        if(!imported.suppliers) throw new Error('format invalide');
        migrate(imported);
        state = imported;
        selectedSupplierId = state.suppliers[0]?.id ?? null;
        save(); render();
        toast('Import réussi.');
      }catch(err){
        toast("Fichier invalide — l'import a échoué.");
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  function bindMainEvents(supplier){
    const main = document.getElementById('mainArea');

    main.querySelectorAll('[data-field]').forEach(inp => {
      inp.addEventListener('change', () => {
        supplier[inp.dataset.field] = inp.value;
        save(); renderSidebar();
      });
    });

    const delSupplierBtn = document.getElementById('btnDeleteSupplier');
    if(delSupplierBtn) delSupplierBtn.addEventListener('click', () => {
      if(!confirm(`Supprimer « ${supplier.name} » et toutes ses évaluations ?`)) return;
      state.suppliers = state.suppliers.filter(s => s.id !== supplier.id);
      selectedSupplierId = state.suppliers[0]?.id ?? null;
      save(); render();
    });

    const toggleNewProduct = document.getElementById('btnToggleNewProduct');
    if(toggleNewProduct) toggleNewProduct.addEventListener('click', () => {
      openNewProductForm = !openNewProductForm;
      render();
      const inp = document.getElementById('newProductName');
      if(inp) inp.focus();
    });

    const saveProductBtn = document.getElementById('btnSaveProduct');
    if(saveProductBtn) saveProductBtn.addEventListener('click', () => {
      const name = document.getElementById('newProductName').value.trim();
      if(!name){ toast('Donnez un nom au produit.'); return; }
      supplier.products = supplier.products || [];
      supplier.products.push({ id: uid(), name, comments: [] });
      openNewProductForm = false;
      save(); render();
    });
    const cancelProductBtn = document.getElementById('btnCancelProduct');
    if(cancelProductBtn) cancelProductBtn.addEventListener('click', () => { openNewProductForm = false; render(); });

    main.querySelectorAll('[data-toggle-product]').forEach(el => {
      el.addEventListener('click', e => {
        if(e.target.closest('[data-delete-product]')) return;
        const pid = el.dataset.toggleProduct;
        if(openProducts.has(pid)) openProducts.delete(pid); else openProducts.add(pid);
        render();
      });
    });

    main.querySelectorAll('[data-delete-product]').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        const pid = el.dataset.deleteProduct;
        const product = getProduct(supplier, pid);
        if(!confirm(`Supprimer le produit « ${product.name} » et ses commentaires ?`)) return;
        supplier.products = supplier.products.filter(p => p.id !== pid);
        save(); render();
      });
    });

    main.querySelectorAll('[data-open-comment]').forEach(el => {
      el.addEventListener('click', () => {
        openNewCommentFor = el.dataset.openComment;
        pendingRating = 0; pendingPhotos = [];
        editingComment = null;
        render();
      });
    });

    const cancelCommentBtn = document.getElementById('btnCancelComment');
    if(cancelCommentBtn) cancelCommentBtn.addEventListener('click', () => {
      openNewCommentFor = null; pendingPhotos = []; pendingRating = 0; render();
    });

    const starPicker = document.getElementById('starPicker');
    if(starPicker) starPicker.addEventListener('click', e => {
      const star = e.target.closest('[data-star]');
      if(!star) return;
      pendingRating = parseInt(star.dataset.star, 10);
      render();
      const ta = document.getElementById('newCommentText');
      if(ta) ta.focus();
    });

    const photoInput = document.getElementById('newCommentPhoto');
    if(photoInput) photoInput.addEventListener('change', e => {
      const files = Array.from(e.target.files || []);
      if(!files.length) return;
      let remaining = files.length;
      files.forEach(file => {
        resizeImage(file, dataUrl => {
          pendingPhotos.push(dataUrl);
          remaining--;
          if(remaining === 0) render();
        });
      });
    });
    main.querySelectorAll('[data-remove-pending-photo]').forEach(el => {
      el.addEventListener('click', () => {
        pendingPhotos.splice(parseInt(el.dataset.removePendingPhoto, 10), 1);
        render();
      });
    });

    const saveCommentBtn = document.getElementById('btnSaveComment');
    if(saveCommentBtn) saveCommentBtn.addEventListener('click', () => {
      if(pendingRating === 0){ toast('Choisissez une note de 1 à 10.'); return; }
      const product = getProduct(supplier, openNewCommentFor);
      const text = document.getElementById('newCommentText').value.trim();
      product.comments = product.comments || [];
      product.comments.push({
        id: uid(),
        rating: pendingRating,
        text,
        photos: pendingPhotos.slice(),
        date: new Date().toISOString()
      });
      openNewCommentFor = null; pendingPhotos = []; pendingRating = 0;
      save(); render();
    });

    main.querySelectorAll('[data-edit-comment]').forEach(el => {
      el.addEventListener('click', () => {
        const [pid, cid] = el.dataset.editComment.split('|');
        const product = getProduct(supplier, pid);
        const c = product.comments.find(x => x.id === cid);
        editingComment = { pid, cid };
        editRating = c.rating;
        editText = c.text || '';
        editPhotos = (c.photos || []).slice();
        openNewCommentFor = null;
        render();
      });
    });

    const cancelEditBtn = document.getElementById('btnCancelEditComment');
    if(cancelEditBtn) cancelEditBtn.addEventListener('click', () => {
      editingComment = null; render();
    });

    const editStarPicker = document.getElementById('editStarPicker');
    if(editStarPicker) editStarPicker.addEventListener('click', e => {
      const star = e.target.closest('[data-edit-star]');
      if(!star) return;
      editRating = parseInt(star.dataset.editStar, 10);
      const ta = document.getElementById('editCommentText');
      editText = ta ? ta.value : editText;
      render();
    });

    const editTextArea = document.getElementById('editCommentText');
    if(editTextArea) editTextArea.addEventListener('input', e => { editText = e.target.value; });

    const editPhotoInput = document.getElementById('editCommentPhoto');
    if(editPhotoInput) editPhotoInput.addEventListener('change', e => {
      const files = Array.from(e.target.files || []);
      if(!files.length) return;
      let remaining = files.length;
      files.forEach(file => {
        resizeImage(file, dataUrl => {
          editPhotos.push(dataUrl);
          remaining--;
          if(remaining === 0) render();
        });
      });
    });
    main.querySelectorAll('[data-remove-edit-photo]').forEach(el => {
      el.addEventListener('click', () => {
        editPhotos.splice(parseInt(el.dataset.removeEditPhoto, 10), 1);
        render();
      });
    });

    const saveEditBtn = document.getElementById('btnSaveEditComment');
    if(saveEditBtn) saveEditBtn.addEventListener('click', () => {
      if(editRating === 0){ toast('Choisissez une note de 1 à 10.'); return; }
      const { pid, cid } = editingComment;
      const product = getProduct(supplier, pid);
      const c = product.comments.find(x => x.id === cid);
      const ta = document.getElementById('editCommentText');
      c.rating = editRating;
      c.text = ta ? ta.value.trim() : editText.trim();
      c.photos = editPhotos.slice();
      editingComment = null;
      save(); render();
    });

    main.querySelectorAll('[data-delete-comment]').forEach(el => {
      el.addEventListener('click', () => {
        const [pid, cid] = el.dataset.deleteComment.split('|');
        const product = getProduct(supplier, pid);
        if(!confirm('Supprimer ce commentaire ?')) return;
        product.comments = product.comments.filter(c => c.id !== cid);
        save(); render();
      });
    });

    main.querySelectorAll('[data-view-photo]').forEach(el => {
      el.addEventListener('click', () => {
        const pid = el.dataset.viewPid, cid = el.dataset.viewCid;
        const index = parseInt(el.dataset.viewIndex, 10);
        const product = getProduct(supplier, pid);
        const c = product.comments.find(x => x.id === cid);
        openLightbox((c.photos || []), index);
      });
    });
  }

  function resizeImage(file, cb){
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const maxDim = 900;
        let { width, height } = img;
        if(width > maxDim || height > maxDim){
          if(width > height){ height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        cb(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  }

  function openLightbox(photos, startIndex){
    if(!photos || !photos.length) return;
    let index = startIndex || 0;
    const box = document.createElement('div');
    box.className = 'lightbox';
    function paint(){
      box.innerHTML = `
        <button class="close" aria-label="Fermer">&times;</button>
        ${photos.length > 1 ? `<button class="lb-nav lb-prev" aria-label="Photo précédente">&#8249;</button>` : ''}
        <img src="${photos[index]}" alt="Photo agrandie ${index+1} sur ${photos.length}">
        ${photos.length > 1 ? `<button class="lb-nav lb-next" aria-label="Photo suivante">&#8250;</button>
        <div class="lb-count mono">${index+1} / ${photos.length}</div>` : ''}
      `;
    }
    paint();
    box.addEventListener('click', e => {
      if(e.target === box || e.target.classList.contains('close')) { box.remove(); return; }
      if(e.target.classList.contains('lb-prev')){ index = (index - 1 + photos.length) % photos.length; paint(); return; }
      if(e.target.classList.contains('lb-next')){ index = (index + 1) % photos.length; paint(); return; }
    });
    document.body.appendChild(box);
  }

  render();
  warnLocalStorageOnce();
})();
</script>
</body>
</html>
